<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>科技导航 - 专属上网首页</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet" />

    <style>
        .glass {
            background: #ffffff !important;
            border: 1px solid #e5e7eb;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            border-radius: 16px !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(245, 158, 11, 0.5), 0 0 60px rgba(245, 158, 11, 0.25), 0 8px 25px rgba(0, 0, 0, 0.15);
            border-color: rgba(245, 158, 11, 0.8);
        }
        .glass-dark {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
        }
        .bg-cyber {
            background: linear-gradient(135deg, #fafbfc 0%, #f1f5f9 50%, #e2e8f0 100%);
        }
        .site-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .site-card:hover {
            transform: scale(1.05) translateY(-4px);
        }
        .icon-bounce {
            transition: transform 0.3s ease;
        }
        .site-card:hover .icon-bounce {
            transform: scale(1.15);
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .cal-cell {
            min-height: 72px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 3px 2px;
            border-radius: 8px;
            font-size: 12px;
            position: relative;
            background: #fafafa;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            cursor: pointer;
        }
        .cal-cell:hover {
            background: #e5e7eb;
            transform: scale(1.04);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .cal-cell.selected {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            color: #92400e;
            border-color: #f59e0b;
            transform: scale(1.05);
            box-shadow: 0 4px 16px rgba(245, 158, 11, 0.4);
        }
        .cal-cell .day-num {
            font-weight: 600;
            font-size: 15px;
            line-height: 1.2;
        }
        .cal-cell .lunar-day {
            font-size: 9px;
            color: #6b7280;
            line-height: 1.2;
            margin-top: 1px;
        }
        .cal-cell .tag {
            font-size: 8px;
            padding: 1px 4px;
            border-radius: 4px;
            margin-top: 1px;
            white-space: nowrap;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            background: rgba(0, 0, 0, 0.05);
            color: #374151;
        }
        .cal-cell.today {
            background: #f59e0b;
            color: white;
            border-color: #f59e0b;
        }
        .cal-cell.today .lunar-day {
            color: rgba(255, 255, 255, 0.85);
        }
        .cal-cell.weekend .day-num {
            color: #e11d48;
        }
        .cal-cell .tag-holiday {
            background: #fce7f3;
            color: #be185d;
        }
        .cal-cell .tag-solar {
            background: #d1fae5;
            color: #065f46;
        }
        .cal-cell .tag-work {
            background: #dbeafe;
            color: #1e40af;
        }
        .nav-btn {
            padding: 4px 12px;
            border-radius: 6px;
            background: #f3f4f6;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            user-select: none;
        }
        .nav-btn:hover {
            background: #e5e7eb;
        }

        @keyframes modalSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .animate-slide-up {
            animation: modalSlideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0a0e27 0%, #050816 40%, #000000 100%);
        }
        body.dark-mode .glass {
            background: #1e293b !important;
            border-color: #334155;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5), 0 0 1px rgba(255, 255, 255, 0.1);
        }
        body.dark-mode .glass-dark {
            background: rgba(15, 23, 42, 0.98);
            border-color: rgba(51, 65, 85, 0.9);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
        }
        body.dark-mode .bg-white\/60 {
            background: rgba(15, 23, 42, 0.95) !important;
        }
        body.dark-mode .text-gray-700,
        body.dark-mode .text-gray-800,
        body.dark-mode .text-gray-900 {
            color: #ffffff !important;
        }
        body.dark-mode .text-gray-600 {
            color: #f1f5f9 !important;
        }
        body.dark-mode .text-gray-500 {
            color: #cbd5e1 !important;
        }
        body.dark-mode .border-gray-200,
        body.dark-mode .border-gray-300 {
            border-color: #334155 !important;
        }
        body.dark-mode #searchInput {
            color: #f1f5f9 !important;
        }
        body.dark-mode #searchInput::placeholder {
            color: #64748b !important;
        }
        body.dark-mode .bg-white {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%) !important;
            border-color: #334155 !important;
        }
        body.dark-mode input[type="text"],
        body.dark-mode input[type="url"],
        body.dark-mode select {
            background: #0f172a !important;
            border-color: #334155 !important;
            color: #f1f5f9 !important;
        }
        body.dark-mode select option {
            background: #0f172a !important;
            color: #f1f5f9 !important;
        }
        body.dark-mode .modal-content {
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            border-color: #475569;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.9);
        }
        body.dark-mode .cal-cell {
            background: #334155;
            border-color: #475569;
        }
        body.dark-mode .cal-cell:hover {
            background: #475569;
        }
        body.dark-mode .cal-cell.selected {
            background: linear-gradient(135deg, #b45309 0%, #d97706 100%);
            color: #fef3c7;
            border-color: #fbbf24;
        }
        body.dark-mode .cal-cell.today {
            background: #f59e0b;
            color: #0f172a;
        }
        body.dark-mode .nav-btn {
            background: #334155;
            color: #e2e8f0;
        }
        body.dark-mode .nav-btn:hover {
            background: #475569;
        }
        body.dark-mode .site-card {
            background: #1e293b;
            border-color: #334155;
        }
        body.dark-mode .site-card h3,
        body.dark-mode .site-card .text-gray-700,
        body.dark-mode .site-card .text-gray-800 {
            color: #ffffff !important;
        }
        body.dark-mode .cal-cell .tag {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }
        body.dark-mode .cal-cell .tag-holiday {
            background: rgba(225, 29, 72, 0.2);
            color: #fb7185;
        }
        body.dark-mode .cal-cell .tag-solar {
            background: rgba(16, 185, 129, 0.2);
            color: #4ade80;
        }
        body.dark-mode .cal-cell .tag-work {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }
        .error-banner {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin: 10px;
            font-size: 14px;
            border: 1px solid #fecaca;
        }
        .api-status {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 9px;
            padding: 1px 6px;
            border-radius: 10px;
        }
        .api-status.success {
            background: #dcfce7;
            color: #166534;
        }
        .api-status.error {
            background: #fee2e2;
            color: #991b1b;
        }
        .api-status.loading {
            background: #fef3c7;
            color: #92400e;
        }
        .api-status .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            display: inline-block;
        }
        .api-status.success .dot {
            background: #22c55e;
        }
        .api-status.error .dot {
            background: #ef4444;
        }
        .api-status.loading .dot {
            background: #f59e0b;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        /* 天气7天预报 */
        .weather-day {
            text-align: center;
            flex: 1;
        }
        .weather-day .day-label {
            font-size: 9px;
            color: #9ca3af;
        }
        .weather-day .day-icon {
            font-size: 14px;
            margin: 1px 0;
        }
        .weather-day .day-temp {
            font-size: 9px;
        }
    </style>
</head>
<body class="min-h-screen bg-cyber overflow-x-hidden">

    <div id="storageWarning" style="display:none; background:#fef2f2; border:1px solid #fecaca; color:#991b1b; padding:10px; text-align:center; font-size:14px;">
        ⚠️ 当前环境不支持 localStorage，所有数据仅在内存中保存，刷新后丢失。
    </div>

    <div id="errorPlaceholder" style="display:none;" class="error-banner"></div>

    <div id="app" class="relative z-10 min-h-screen flex flex-col">
        <!-- 顶部状态栏 -->
        <div class="bg-white/60 backdrop-blur-xl border-b border-gray-200/50 py-1.5 px-4">
            <div class="max-w-7xl mx-auto flex items-center justify-between text-xs">
                <div class="flex items-center space-x-6">
                    <span class="text-gray-700 font-medium flex items-center">
                        <span class="w-2 h-2 rounded-full bg-green-500 mr-2 animate-pulse"></span> ONLINE
                    </span>
                    <span class="text-gray-500"><i class="fa fa-clock-o mr-1"></i>运行: <span id="uptime">00:00:00</span></span>
                </div>
                <div class="flex items-center space-x-6 text-gray-500">
                    <span>CPU: 12%</span><span>MEM: 4.2GB</span><span>NET: 128MB/s</span>
                </div>
            </div>
        </div>

        <!-- 顶部导航 -->
        <header class="glass-dark sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-amber-400 to-pink-500 flex items-center justify-center shadow-lg">
                            <i class="fa fa-bolt text-lg text-white"></i>
                        </div>
                        <div>
                            <h1 class="text-lg font-bold">CYBER NAV</h1>
                            <p class="text-xs text-gray-500">科技导航系统 · <span id="siteCount">144</span>个网站</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-2">
                        <button id="themeToggle" class="px-3 py-1.5 rounded-lg bg-gray-500/20 hover:bg-gray-500/30 border border-gray-500/40 text-gray-600 transition-all text-sm" title="切换主题">
                            <i class="fa fa-moon-o"></i>
                        </button>
                        <button id="addSiteBtn" class="px-3 py-1.5 rounded-lg bg-amber-500/20 hover:bg-amber-500/30 border border-amber-500/40 text-amber-600 transition-all flex items-center space-x-1 text-sm">
                            <i class="fa fa-plus"></i><span class="hidden sm:inline">添加网站</span>
                        </button>
                        <button id="toggleEdit" class="px-3 py-1.5 rounded-lg bg-gray-500/20 hover:bg-gray-500/30 border border-gray-500/40 text-gray-600 transition-all text-sm">
                            <i class="fa fa-pencil"></i>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- ===== 信息面板 - 三列均匀布局 ===== -->
        <section class="px-4 pt-6">
            <div class="max-w-7xl mx-auto">
                <div class="grid grid-cols-12 gap-4 mb-6">
                    <!-- 列1: 时间/黄历 (4列) -->
                    <div class="col-span-4 glass rounded-2xl p-5 cursor-pointer flex items-center" onclick="openDetailModal('calendar')">
                        <div class="text-center w-full">
                            <div class="text-4xl font-bold mb-1" id="currentTime">--:--</div>
                            <div class="flex items-center justify-center space-x-3 mb-1.5">
                                <span class="text-base font-medium" id="currentDate">----年--月--日</span>
                                <span class="text-xs text-gray-500" id="currentWeek">星期--</span>
                            </div>
                            <div class="text-base mb-1.5" id="lunarDate">农历 -- --</div>
                            <div class="flex justify-center space-x-8 text-sm">
                                <span class="text-green-600"><i class="fa fa-check-circle mr-1.5"></i>宜：<span id="yiText">加载中...</span></span>
                                <span class="text-rose-600"><i class="fa fa-times-circle mr-1.5"></i>忌：<span id="jiText">加载中...</span></span>
                            </div>
                            <div class="mt-2 flex justify-center">
                                <span id="huangliApiStatus" class="api-status loading"><span class="dot"></span>黄历</span>
                            </div>
                        </div>
                    </div>

                    <!-- 列2: 天气 (4列) -->
                    <div class="col-span-4 glass rounded-2xl p-5 cursor-pointer" onclick="openDetailModal('weather')">
                        <div class="flex items-center justify-between">
                            <div>
                                <div class="text-3xl font-bold" id="weatherTemp">--°C</div>
                                <div class="text-sm text-gray-600" id="weatherDesc">加载中...</div>
                                <div class="text-xs text-gray-400" id="weatherUpdate">--</div>
                            </div>
                            <div class="text-5xl text-amber-500" id="weatherIcon">
                                <i class="fa fa-spinner fa-spin"></i>
                            </div>
                        </div>
                        <div class="flex justify-between text-sm mt-2">
                            <span><i class="fa fa-tint text-blue-500 mr-1.5"></i><span id="weatherHumidity">湿度 --</span></span>
                            <span><i class="fa fa-location-arrow text-cyan-500 mr-1.5"></i><span id="weatherWind">风速 --</span></span>
                        </div>
                        <div class="border-t border-gray-200 mt-3 pt-3">
                            <div class="flex justify-between" id="weatherForecast7Days"></div>
                        </div>
                        <div class="mt-2 flex justify-center">
                            <span id="weatherApiStatus" class="api-status loading"><span class="dot"></span>天气</span>
                        </div>
                    </div>

                    <!-- 列3: 油价 (4列) -->
                    <div class="col-span-4 glass rounded-2xl p-5 cursor-pointer flex items-center" onclick="openDetailModal('oil')">
                        <div class="w-full">
                            <div class="flex items-center justify-between mb-2">
                                <span class="font-bold text-lg flex items-center"><i class="fa fa-tint mr-2 text-amber-500"></i>今日油价</span>
                                <div class="flex items-center gap-2">
                                    <span id="oilPriceTrend" class="text-xs bg-green-100 text-green-700 px-2.5 py-1 rounded-full"><i class="fa fa-arrow-down mr-1"></i>下调</span>
                                    <button onclick="event.stopPropagation(); forceRefreshOil();" class="text-sm text-blue-500 hover:text-blue-700 transition-colors" title="手动刷新">
                                        <i class="fa fa-refresh" id="oilRefreshIcon"></i>
                                    </button>
                                </div>
                            </div>
                            <div id="oilNextAdjust" class="text-xs text-gray-500 mb-2"><i class="fa fa-clock-o mr-1"></i>加载中...</div>
                            <div class="grid grid-cols-2 gap-x-4 gap-y-1.5 text-base">
                                <div class="flex justify-between"><span class="text-gray-600">92#</span><span id="oil92" class="font-bold">--</span></div>
                                <div class="flex justify-between"><span class="text-gray-600">95#</span><span id="oil95" class="font-bold">--</span></div>
                                <div class="flex justify-between"><span class="text-gray-600">98#</span><span id="oil98" class="font-bold">--</span></div>
                                <div class="flex justify-between"><span class="text-gray-600">0#</span><span id="oil0" class="font-bold">--</span></div>
                            </div>
                            <div class="text-xs text-gray-400 mt-2 text-center" id="oilUpdateTime">更新于 --</div>
                            <div class="mt-1.5 flex justify-center">
                                <span id="oilApiStatus" class="api-status loading"><span class="dot"></span>油价</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 搜索 -->
        <section class="py-4 px-4">
            <div class="max-w-3xl mx-auto">
                <div class="relative glass-dark rounded-2xl p-0.5">
                    <div class="flex items-center bg-white rounded-xl border border-gray-200">
                        <i class="fa fa-search text-gray-400 ml-4"></i>
                        <input type="text" id="searchInput" placeholder="搜索 144 个网站或输入网址..." class="flex-1 bg-transparent px-4 py-3 outline-none text-gray-800 placeholder-gray-400 text-sm" />
                        <select id="searchEngine" class="bg-transparent text-gray-600 px-3 py-3 outline-none cursor-pointer border-l border-gray-200 text-sm">
                            <option value="baidu">百度</option><option value="google">Google</option><option value="bing">Bing</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>

        <!-- 分类标签 -->
        <section class="px-4 mb-3">
            <div class="max-w-7xl mx-auto">
                <div class="flex items-center space-x-2 overflow-x-auto scrollbar-hide pb-2" id="categoryTabs"></div>
            </div>
        </section>

        <!-- 二级分类 -->
        <section class="px-4 mb-4" id="subCategorySection" style="display: none;">
            <div class="max-w-7xl mx-auto">
                <div class="flex items-center space-x-2 overflow-x-auto scrollbar-hide pb-2 pl-4 border-l-2 border-amber-500/30" id="subCategoryTabs"></div>
            </div>
        </section>

        <!-- 网站卡片 -->
        <main class="flex-1 px-4 pb-12">
            <div class="max-w-7xl mx-auto">
                <div id="sitesGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4"></div>
            </div>
        </main>
    </div>

    <!-- 添加/编辑模态框 -->
    <div id="addModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4" onclick="closeAddModal()">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
        <div class="relative glass-dark rounded-2xl w-full max-w-md animate-slide-up modal-content" onclick="event.stopPropagation()">
            <div class="p-6">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-xl font-bold" id="modalTitle">添加网站</h3>
                    <button onclick="closeAddModal()" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center"><i class="fa fa-times"></i></button>
                </div>
                <form id="siteForm" class="space-y-4">
                    <input type="hidden" id="editId" />
                    <div><label class="block text-sm text-gray-600 mb-2">网站名称</label><input type="text" id="siteName" placeholder="例如：百度" class="w-full bg-gray-50 rounded-xl px-4 py-3 outline-none border border-gray-200 focus:border-amber-500" required /></div>
                    <div><label class="block text-sm text-gray-600 mb-2">网址</label><input type="url" id="siteUrl" placeholder="https://www.baidu.com" class="w-full bg-gray-50 rounded-xl px-4 py-3 outline-none border border-gray-200 focus:border-amber-500" required /></div>
                    <div><label class="block text-sm text-gray-600 mb-2">所属分类</label>
                        <select id="siteCategory" class="w-full bg-gray-50 rounded-xl px-4 py-3 outline-none border border-gray-200 focus:border-amber-500">
                            <option value="常用">常用</option><option value="搜索">搜索</option><option value="社交">社交</option>
                            <option value="视频">视频</option><option value="购物">购物</option><option value="资讯">资讯</option>
                            <option value="工具">工具</option><option value="学习">学习</option><option value="我的书签">我的书签</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full py-3 rounded-xl bg-gradient-to-r from-amber-500 to-pink-500 text-white font-medium hover:opacity-90 transition-all shadow-lg">保存</button>
                </form>
            </div>
        </div>
    </div>

    <!-- 详情模态框 -->
    <div id="detailModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4" onclick="closeDetailModal()">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
        <div class="relative glass rounded-2xl w-full max-w-2xl animate-slide-up modal-content" onclick="event.stopPropagation()">
            <div class="p-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-xl font-bold" id="detailTitle">详情</h3>
                    <button onclick="closeDetailModal()" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center"><i class="fa fa-times"></i></button>
                </div>
                <div id="detailContent" class="max-h-[600px] overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        //  全局错误捕获
        // ================================================================
        window.onerror = function(msg, url, line, col, error) {
            const ep = document.getElementById('errorPlaceholder');
            if (ep) { ep.style.display = 'block';
                ep.innerHTML = `<strong>⚠️ 页面运行异常</strong><br>${msg}`; }
            console.error('全局错误:', msg, error);
            return true;
        };
        window.addEventListener('unhandledrejection', function(event) {
            console.error('未处理的 Promise 错误:', event.reason);
            const ep = document.getElementById('errorPlaceholder');
            if (ep) { ep.style.display = 'block';
                ep.innerHTML = `<strong>⚠️ 异步错误</strong><br>${event.reason?.message || '未知错误'}`; }

                };

            async function fetchWeather() {
                updateWeatherApiStatus('loading', '请求中...');

                try {
                    const realUrl = `${WEATHER_API_URL}?key=${TIAN_API_KEY}&city=上海&type=1`;
                    const realResp = await fetch(realUrl, { signal: AbortSignal.timeout(8000) });
                    if (!realResp.ok) throw new Error(`HTTP ${realResp.status}`);
                    const realData = await realResp.json();
                    if (realData.code !== 200) throw new Error(`API错误 (${realData.code}): ${realData.msg}`);

                    const result = realData.result;
                    if (!result) throw new Error('数据为空');

                    const temp = result.real || '--';
                    const weather = result.weather || '未知';
                    const humidity = result.humidity || '--';
                    const wind = result.wind || '--';
                    const windsc = result.windsc || '--';
                    const quality = result.quality || '--';
                    const aqi = result.aqi || '--';
                    const area = result.area || '上海';

                    const forecastUrl = `${WEATHER_API_URL}?key=${TIAN_API_KEY}&city=上海&type=7`;
                    const forecastResp = await fetch(forecastUrl, { signal: AbortSignal.timeout(8000) });
                    const forecastData = await forecastResp.json();
                    const daily = [];
                    if (forecastData.code === 200 && forecastData.result && forecastData.result.list) {
                        const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
                        forecastData.result.list.forEach((item, index) => {
                            const dayName = index === 0 ? '今天' : item.week || weekdays[index % 7];
                            const maxT = item.highest ? parseInt(item.highest) : 0;
                            const minT = item.lowest ? parseInt(item.lowest) : 0;
                            const wDesc = item.weather || '未知';
                            const wIcon = getWeatherIcon(wDesc);
                            daily.push({
                                day: dayName,
                                date: item.date || `${index+1}/${1}`,
                                max: maxT,
                                min: minT,
                                desc: wDesc,
                                icon: wIcon
                            });
                        });
                    }
                    if (daily.length === 0) {
                        const weekdays = ['今天', '明天', '后天', '周四', '周五', '周六', '周日'];
                        const descs = ['晴', '多云', '阴', '小雨', '晴转多云', '多云转阴', '阵雨'];
                        const icons = ['fa-sun-o', 'fa-cloud', 'fa-cloud', 'fa-umbrella', 'fa-sun-o', 'fa-cloud',
                            'fa-umbrella'
                        ];
                        for (let i = 0; i < 7; i++) {
                            daily.push({
                                day: weekdays[i],

                                max: 20 + Math.floor(Math.random() * 10),
                                min: 15 + Math.floor(Math.random() * 8),
                                desc: descs[i % descs.length],
                                icon: icons[i % icons.length]
                            });
                        }
                    }

                    weatherData = {
                        temp: temp,
                        desc: `${weather} · ${area}`,
                        icon: getWeatherIcon(weather),
                        humidity: humidity ? `${humidity}%` : '--',
                        wind: wind && windsc ? `${wind} ${windsc}` : (wind || '--'),
                        city: area,
                        updateTime: new Date().toLocaleTimeString('zh-CN'),
                        daily: daily,
                        aqi: aqi,
                        quality: quality,
                        apiStatus: 'success'
                    };

                    updateWeatherApiStatus('success', `${weather} ${temp}`);
                    renderWeather();
                    storage.setItem('weatherCache', JSON.stringify({ timestamp: Date.now(), data: weatherData }));

                } catch (error) {
                    console.warn('⚠️ 天气API失败:', error.message);
                    weatherData.apiStatus = 'error';
                    updateWeatherApiStatus('error', error.message);

                    const cached = storage.getItem('weatherCache');
                    if (cached) {
                        try {
                            const cache = JSON.parse(cached);
                            weatherData = cache.data;
                            weatherData.updateTime = '缓存数据 (API暂不可用)';
                            renderWeather();
                            return;
                        } catch (e) {}
                    }

                    const mockDaily = [];
                    const weekdays = ['今天', '明天', '后天', '周四', '周五', '周六', '周日'];
                    const descs = ['晴', '多云', '阴', '小雨', '晴转多云', '多云转阴', '阵雨'];

                        'fa-umbrella'
                    ];
                    for (let i = 0; i < 7; i++) {
                        mockDaily.push({
                            day: weekdays[i],
                            date: `${i+1}/1`,
                            max: 20 + Math.floor(Math.random() * 10),
                            min: 15 + Math.floor(Math.random() * 8),
                            desc: descs[i % descs.length],

                        desc: '晴 · 上海',

            async function fetchOilPrice() {
                const cached = storage.getItem('oilPricesCache');
                if (cached) {
                    try {
                        const cache = JSON.parse(cached);
                        if (Date.now() - cache.timestamp < 300000) {
                            oilData = cache.data;
                            renderOil();
                            updateOilApiStatus('success', '缓存');
                            return;
                        }
                    } catch (e) {}
                }

                updateOilApiStatus('loading', '请求中...');

                try {
                    const url = `${OIL_MARKET_API_URL}?key=${TIAN_API_KEY}&prov=上海`;
                    const resp = await fetch(url, { signal: AbortSignal.timeout(8000) });
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const data = await resp.json();
                    if (data.code !== 200) throw new Error(`API错误 (${data.code}): ${data.msg}`);

                    const result = data.result;
                    if (!result) throw new Error('数据为空');

                    const parsePrice = (item) => { if (!item) return 0; return parseFloat(item.price) || 0; };
                    const parseChange = (item) => { if (!item) return 0; return parseFloat(item.price_change) || 0; };

                    const p92 = result.p92 || {},
                        p95 = result.p95 || {},
                        p98 = result.p98 || {},
                        p0 = result.p0 || {};
                    const prices = {
                        '92': parsePrice(p92),
                        '95': parsePrice(p95),
                        '98': parsePrice(p98),
                        '0': parsePrice(p0)
                    };
                    if (prices['92'] <= 0 || prices['95'] <= 0) throw new Error('油价数据异常');

                    let trend = 'down';
                    const change92 = parseChange(p92);
                    if (change92 > 0) trend = 'up';
                    else if (change92 < 0) trend = 'down';
                    else {
                        const oldCached = storage.getItem('oilPricesCache');
                        if (oldCached) {
                            try {
                                const old = JSON.parse(oldCached);
                                if (old.data && old.data.prices) {
                                    const old92 = parseFloat(old.data.prices['92']) || 0;
                                    if (prices['92'] > old92) trend = 'up';
                                    else if (prices['92'] < old92) trend = 'down';
                                }
                            } catch (e) {}
                        }
                    }

                    const formatDate = (dateStr) => {
                        if (!dateStr || dateStr.length !== 8) return dateStr;
                        return `${dateStr.substring(0,4)}年${dateStr.substring(4,6)}月${dateStr.substring(6,8)}日`;
                    };

                    oilData.prices = prices;
                    oilData.trend = trend;
                    oilData.lastAdjusted = formatDate(result.last_adjusted);
                    oilData.nextAdjustment = formatDate(result.next_adjustment);
                    oilData.region = result.prov || '上海';
                    oilData.updateTime = new Date().toLocaleString('zh-CN');
                    oilData.source = '天行API';
                    oilData.apiStatus = 'success';

                    storage.setItem('oilPricesCache', JSON.stringify({ timestamp: Date.now(), data: oilData }));
                    renderOil();
                    updateOilApiStatus('success', `${oilData.region} ${prices['92']}元`);

                } catch (error) {
                    console.warn('⚠️ 油价行情API失败:', error.message);
                    oilData.apiStatus = 'error';
                    updateOilApiStatus('error', error.message);

                    if (cached) {
                        try {
                            const cache = JSON.parse(cached);
                            oilData = cache.data;
                            oilData.updateTime = '缓存数据 (API暂不可用)';
                            oilData.source = '缓存';
                            renderOil();
                            return;
                        } catch (e) {}
                    }

                    oilData.prices = { '92': 7.14, '95': 7.60, '98': 9.60, '0': 6.80 };
                    oilData.trend = 'down';
                    oilData.lastAdjusted = '2026-07-17';
                    oilData.nextAdjustment = '2026-07-27';
                    oilData.region = '上海';
                    oilData.updateTime = '默认数据';
                    oilData.source = '默认数据';
                    renderOil();
                }
            }

            function renderOil() {
                const p = oilData.prices;
                const isDown = oilData.trend === 'down';
                const isUp = oilData.trend === 'up';

                const trendEl = document.getElementById('oilPriceTrend');
                const nextEl = document.getElementById('oilNextAdjust');

                if (trendEl) {
                    if (isDown) {
                        trendEl.className = 'text-xs bg-green-100 text-green-700 px-2.5 py-1 rounded-full';
                        trendEl.innerHTML = '<i class="fa fa-arrow-down mr-1"></i>下调';
                    } else if (isUp) {
                        trendEl.className = 'text-xs bg-red-100 text-red-700 px-2.5 py-1 rounded-full';
                        trendEl.innerHTML = '<i class="fa fa-arrow-up mr-1"></i>上调';
                    } else {
                        trendEl.className = 'text-xs bg-gray-100 text-gray-600 px-2.5 py-1 rounded-full';
                        trendEl.innerHTML = '<i class="fa fa-minus mr-1"></i>持平';
                    }
                }

                if (nextEl) {
                    nextEl.innerHTML =
                        `<i class="fa fa-clock-o mr-1"></i>${oilData.nextAdjustment || '待定'}调价 · ${oilData.region}`;
                }

                const formatPrice = (val) => {
                    if (val === '--' || isNaN(val) || val <= 0) return '--';
                    return val.toFixed(2);
                };

                const changeSymbol = isDown ? '↓' : (isUp ? '↑' : '');
                const changeColor = isDown ? 'text-green-600' : (isUp ? 'text-red-600' : 'text-gray-400');

                document.getElementById('oil92').innerHTML =
                    `${formatPrice(p['92'])} ${changeSymbol ? `<span class="text-xs ${changeColor}">${changeSymbol}0.12</span>` : ''}`;
                document.getElementById('oil95').innerHTML =
                    `${formatPrice(p['95'])} ${changeSymbol ? `<span class="text-xs ${changeColor}">${changeSymbol}0.12</span>` : ''}`;
                document.getElementById('oil98').innerHTML =
                    `${formatPrice(p['98'])} ${changeSymbol ? `<span class="text-xs ${changeColor}">${changeSymbol}0.12</span>` : ''}`;
                document.getElementById('oil0').innerHTML =
                    `${formatPrice(p['0'])} ${changeSymbol ? `<span class="text-xs ${changeColor}">${changeSymbol}0.12</span>` : ''}`;

                document.getElementById('oilUpdateTime').textContent = '更新于 ' + oilData.updateTime;
            }
