            }

            // ================================================================
            //  8. 日历渲染（不带节假日，只显示农历）
            // ================================================================
            let currentCalendarYear = new Date().getFullYear();
            let currentCalendarMonth = new Date().getMonth() + 1;
            let calendarCache = {};

            async function renderCalendar(year, month) {
                const container = document.getElementById('calendarGrid');
                if (!container) return;
                const titleEl = document.getElementById('calendarTitle');
                if (titleEl) titleEl.textContent = `${year}年${month}月`;

                const firstDay = new Date(year, month - 1, 1).getDay();
                const daysInMonth = new Date(year, month, 0).getDate();
                const today = new Date();

                let html = '<div class="grid grid-cols-7 gap-1">';
                const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
                weekDays.forEach(w => html += `<div class="text-center text-xs text-gray-500 font-medium py-1">${w}</div>`);

                for (let i = 0; i < firstDay; i++) html += `<div class="p-1"></div>`;

                const datePromises = [];
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    if (calendarCache[dateStr]) {
                        datePromises.push(Promise.resolve(calendarCache[dateStr]));
                    } else {
                        datePromises.push(fetchSingleDayHuangli(year, month, d));
                    }
                }
                const dayInfos = await Promise.all(datePromises);

                for (let d = 1; d <= daysInMonth; d++) {
                    const info = dayInfos[d - 1] || {};
                    const isToday = (year === today.getFullYear() && month === today.getMonth() + 1 && d === today.getDate());
                    const dayOfWeek = (firstDay + d - 1) % 7;
                    const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);

                    let classes = 'cal-cell';
                    if (isToday) classes += ' today';
                    else if (isWeekend) classes += ' weekend';

                    // 只显示农历节日（来自老黄历API）
                    const festival = info.festival || '';
                    const lunarFestival = info.lunarFestival || '';

                    let tagsHtml = '';
                    if (festival !== '--' && festival !== '') {
                        tagsHtml += `<div class="tag tag-festival">${festival}</div>`;
                    }
                    if (lunarFestival !== '--' && lunarFestival !== '') {
                        tagsHtml += `<div class="tag tag-festival">${lunarFestival}</div>`;
                    }

                    const lunarDayDisplay = info.lunarDay || '';

                    html += `<div class="${classes}" onclick="handleDateClick(this, ${year}, ${month}, ${d})" title="点击查看黄历详情">
                        <div class="day-num">${d}</div>
                        <div class="lunar-day">${lunarDayDisplay}</div>
                        ${tagsHtml}
                    </div>`;
                }
                html += '</div>';
                container.innerHTML = html;

                const now = new Date();
                const todayInfo = await fetchSingleDayHuangli(now.getFullYear(), now.getMonth() + 1, now.getDate());
                updateYiJiDisplay(todayInfo);
            }

            async function fetchSingleDayHuangli(year, month, day) {
                const dateStr =
                    `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

                if (calendarCache[dateStr]) {
                    return calendarCache[dateStr];
                }

                try {
                    const url = `${HUANGLI_API_URL}?key=${TIAN_API_KEY}&date=${dateStr}`;
                    const resp = await fetch(url, { signal: AbortSignal.timeout(5000) });
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const data = await resp.json();

                    if (data.code === 200 && data.result) {
                        const result = data.result;
                        const info = {
                            lunarDay: result.lunarday || '--',
                            lunarMonth: result.lubarmonth || '--',
                            lunarYear: result.tiangandizhiyear || '--',
                            shengxiao: result.shengxiao || '--',
                            fitness: result.fitness || '--',
                            taboo: result.taboo || '--',
                            chongsha: result.chongsha || '--',
                            pengzu: result.pengzu || '--',
                            xingsu: result.xingsu || '--',
                            shenwei: result.shenwei || '--',
                            taishen: result.taishen || '--',
                            jianshen: result.jianshen || '--',
                            festival: result.festival || '--',
                            lunarFestival: result.lunar_festival || '--',
                            gregoriandate: result.gregoriandate || '--',
                            tiangandizhi: {
                                year: result.tiangandizhiyear || '--',
                                month: result.tiangandizhimonth || '--',
                                day: result.tiangandizhiday || '--'
                            }
                        };
                        calendarCache[dateStr] = info;
                        return info;
                    }
                } catch (e) {
                    console.warn(`获取${dateStr}黄历失败:`, e.message);
                }

                const defaultInfo = {
                    lunarDay: '--',
                    lunarMonth: '--',
                    lunarYear: '--',
                    shengxiao: '--',
                    fitness: '--',
                    taboo: '--',
                    chongsha: '--',
                    pengzu: '--',
                    xingsu: '--',
                    shenwei: '--',
                    taishen: '--',
                    jianshen: '--',
                    festival: '--',
                    lunarFestival: '--',
                    gregoriandate: '--',
                    tiangandizhi: { year: '--', month: '--', day: '--' }
                };
                calendarCache[dateStr] = defaultInfo;
                return defaultInfo;
            }

            function updateYiJiDisplay(info) {
                const el = document.getElementById('calendarYiJi');
                if (!el) return;

                const yiText = info.fitness !== '--' ? info.fitness.replace(/\./g, '、').replace(/,/g, '、') : '无';
                const jiText = info.taboo !== '--' ? info.taboo.replace(/\./g, '、').replace(/,/g, '、') : '无';

                let lunarDisplay = '';
                if (info.lunarYear !== '--' && info.lunarMonth !== '--' && info.lunarDay !== '--') {
                    lunarDisplay =
                        `${info.tiangandizhi.year || info.lunarYear}年【${info.shengxiao}年】 ${info.lunarMonth}月${info.lunarDay}`;
                } else if (info.lunarDay !== '--') {
                    lunarDisplay = `${info.lunarMonth}月${info.lunarDay}`;
                } else {
                    lunarDisplay = '--';
                }

                let html = `
                    <div class="space-y-3 text-left">
                        <div class="text-center p-2 bg-amber-50 rounded-lg border border-amber-200">
                            <div class="text-sm font-medium text-gray-700">📅 ${lunarDisplay}</div>
                            ${info.festival !== '--' && info.festival !== '' ? `<div class="text-xs text-rose-600 mt-1">🎉 公历节日：${info.festival}</div>` : ''}
                            ${info.lunarFestival !== '--' && info.lunarFestival !== '' ? `<div class="text-xs text-amber-600 mt-1">🎊 农历节日：${info.lunarFestival}</div>` : ''}
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="p-3 bg-green-50 rounded-lg border border-green-200">
                                <div class="text-xs text-green-600 font-bold mb-1">✅ 宜</div>
                                <div class="text-sm text-gray-700">${yiText}</div>
                            </div>
                            <div class="p-3 bg-rose-50 rounded-lg border border-rose-200">
                                <div class="text-xs text-rose-600 font-bold mb-1">❌ 忌</div>
                                <div class="text-sm text-gray-700">${jiText}</div>
                            </div>
                        </div>
                        ${info.chongsha !== '--' ? `<div class="flex items-center text-sm"><span class="text-gray-500 w-16">🐉 冲煞：</span><span class="text-gray-700">${info.chongsha}</span></div>` : ''}
                        ${info.jianshen !== '--' ? `<div class="flex items-center text-sm"><span class="text-gray-500 w-16">📐 建除：</span><span class="text-gray-700">${info.jianshen}</span></div>` : ''}
                        ${info.shenwei !== '--' ? `<div class="bg-amber-50 rounded-lg p-2 border border-amber-200">
                            <div class="text-xs text-amber-700 font-bold mb-1">🧭 吉神方位</div>
                            <div class="text-sm text-gray-700">${info.shenwei}</div>
                        </div>` : ''}
                        ${info.xingsu !== '--' ? `<div class="bg-indigo-50 rounded-lg p-2 border border-indigo-200 text-sm"><span class="text-gray-500">⭐ 星宿：</span><span class="text-gray-700">${info.xingsu}</span></div>` : ''}
                        ${info.pengzu !== '--' ? `<div class="bg-purple-50 rounded-lg p-2 border border-purple-200 text-sm"><span class="text-gray-500">⚠️ 彭祖百忌：</span><span class="text-gray-700">${info.pengzu}</span></div>` : ''}
                        ${info.taishen !== '--' ? `<div class="bg-blue-50 rounded-lg p-2 border border-blue-200 text-sm"><span class="text-gray-500">👶 胎神：</span><span class="text-gray-700">${info.taishen}</span></div>` : ''}
                        ${info.tiangandizhi.year !== '--' ? `<div class="text-xs text-gray-400 mt-1">干支：${info.tiangandizhi.year}年 ${info.tiangandizhi.month}月 ${info.tiangandizhi.day}日</div>` : ''}
                        <div class="text-center text-xs text-gray-400">📌 数据来源：天行API老黄历（45号）</div>
                    </div>
                `;
                el.innerHTML = html;
            }

            window.handleDateClick = async function(el, year, month, day) {
                document.querySelectorAll('.cal-cell').forEach(c => c.classList.remove('selected'));
                el.classList.add('selected');
                const info = await fetchSingleDayHuangli(year, month, day);
                updateYiJiDisplay(info);
                const yiJi = document.getElementById('calendarYiJi');
                if (yiJi) yiJi.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            };

            // ================================================================
            //  9. 时间更新
            // ================================================================
            async function updateTime() {
                const now = new Date();
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                const y = now.getFullYear();
                const mon = String(now.getMonth() + 1).padStart(2, '0');
                const d = String(now.getDate()).padStart(2, '0');
                const weeks = ['日', '一', '二', '三', '四', '五', '六'];
                const w = weeks[now.getDay()];

                document.getElementById('currentTime').textContent = `${h}:${m}:${s}`;
                document.getElementById('currentDate').textContent = `${y}年${mon}月${d}日`;
                document.getElementById('currentWeek').textContent = `星期${w}`;

                // 更新黄历显示
                renderHuangli();
            }

            // ================================================================
            //  10. 网站卡片渲染
            // ================================================================
            function renderCategories() {
                const container = document.getElementById('categoryTabs');
                if (!container) return;
                container.innerHTML = categories.map(cat => {
                    const count = sites.filter(s => s.category === cat).length;
                    return `<button class="px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all ${selectedCategory === cat ? 'bg-white text-gray-800 shadow-md' : 'bg-white/50 text-gray-600 hover:bg-white/70 border border-gray-200/50'}" data-category="${cat}">${cat} <span class="opacity-60 text-xs">(${count})</span></button>`;
                }).join('');
                container.querySelectorAll('button').forEach(tab => {
                    tab.addEventListener('click', () => {
                        selectedCategory = tab.dataset.category;
                        selectedSubCategory = '全部书签';
                        renderCategories();
                        renderSubCategories();
                        renderSites();
                    });
                });
            }

            function renderSubCategories() {
                const subSection = document.getElementById('subCategorySection');
                const container = document.getElementById('subCategoryTabs');
                if (!subSection || !container) return;
                if (selectedCategory === '我的书签') {
                    subSection.style.display = 'block';
                    container.innerHTML = bookmarkSubCategories.map(cat => {
                        const count = cat === '全部书签' ? sites.filter(s => s.category === '我的书签').length : sites
                            .filter(s => s.category === '我的书签' && s.subCategory === cat).length;
                        return `<button class="px-3 py-1 rounded-full text-xs font-medium whitespace-nowrap transition-all ${selectedSubCategory === cat ? 'bg-white text-gray-700 shadow-md' : 'bg-white/40 text-gray-500 hover:bg-white/60 border border-gray-200/40'}" data-subcategory="${cat}">${cat} (${count})</button>`;
                    }).join('');
                    container.querySelectorAll('button').forEach(tab => {
                        tab.addEventListener('click', () => {
                            selectedSubCategory = tab.dataset.subcategory;
                            renderSubCategories();
                            renderSites();
                        });
                    });
                } else {
                    subSection.style.display = 'none';
                }
            }

            function debounce(fn, delay) {
                let timer;
                return function(...args) {
                    clearTimeout(timer);
                    timer = setTimeout(() => fn.apply(this, args), delay);
                };
            }

            function renderSites() {
                const container = document.getElementById('sitesGrid');
                if (!container) return;
                let filteredSites = sites.filter(s => s.category === selectedCategory);
                if (selectedCategory === '我的书签' && selectedSubCategory !== '全部书签') {
                    filteredSites = filteredSites.filter(s => s.subCategory === selectedSubCategory);
                }
                const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
                if (searchTerm) {
                    filteredSites = filteredSites.filter(s => s.name.toLowerCase().includes(searchTerm) || s.url.toLowerCase()
                        .includes(searchTerm));
                }
                if (filteredSites.length === 0) {
                    container.innerHTML =
                        `<div class="col-span-full text-center py-12 text-gray-500"><i class="fa fa-search fa-2x mb-2"></i><p>没有找到匹配的网站</p></div>`;
                    return;
                }
                container.innerHTML = filteredSites.map((site, index) => `
                    <div class="site-card glass rounded-2xl p-4 relative" style="animation-delay: ${index * 0.03}s">
                        ${isEditMode ? `
                            <div class="absolute top-2 right-2 flex space-x-1">
                                <button onclick="editSite(${site.id})" class="w-6 h-6 rounded-full bg-blue-500 text-white text-xs hover:bg-blue-600 transition-colors"><i class="fa fa-pencil"></i></button>
                                <button onclick="deleteSite(${site.id})" class="w-6 h-6 rounded-full bg-rose-500 text-white text-xs hover:bg-rose-600 transition-colors"><i class="fa fa-trash"></i></button>
                            </div>
                        ` : ''}
                        <a href="${site.url}" target="_blank" class="flex flex-col items-center text-center block">
                            <div class="icon-bounce w-14 h-14 rounded-xl bg-gradient-to-br ${colorMap[site.color] || colorMap.amber} flex items-center justify-center mb-3 text-xl font-bold text-white shadow-lg">${site.name.charAt(0)}</div>
                            <h4 class="font-medium text-sm mb-1">${site.name}</h4>
                            <p class="text-xs text-gray-500">${site.subCategory || site.category}</p>
                        </a>
                    </div>
                `).join('');
            }

            // ================================================================
            //  11. 事件绑定
            // ================================================================
            function setupEventListeners() {
                document.getElementById('addSiteBtn').addEventListener('click', openAddModal);
                const searchInput = document.getElementById('searchInput');
                searchInput.addEventListener('input', debounce(renderSites, 300));
                searchInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        const value = e.target.value.trim();
                        if (value) {
                            const engine = document.getElementById('searchEngine').value;
                            const urlMap = { baidu: `https://www.baidu.com/s?wd=${encodeURIComponent(value)}`,
                                google: `https://www.google.com/search?q=${encodeURIComponent(value)}`,
                                bing: `https://www.bing.com/search?q=${encodeURIComponent(value)}` };
                            window.open(urlMap[engine] || urlMap.baidu, '_blank');
                        }
                    }
                });
                document.getElementById('toggleEdit').addEventListener('click', () => {
                    isEditMode = !isEditMode;
                    renderSites();
                });
                document.getElementById('siteForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const name = document.getElementById('siteName').value.trim();
                    const url = document.getElementById('siteUrl').value.trim();
                    const category = document.getElementById('siteCategory').value;
                    const editId = document.getElementById('editId').value;
                    if (!name || !url) return;
                    if (editId) {
                        const site = sites.find(s => s.id === parseInt(editId));
                        if (site) { site.name = name;
                            site.url = url;
                            site.category = category; if (category !== '我的书签') delete site.subCategory; }
                    } else {
                        const newSite = { id: Date.now(), name, url, category, color: 'blue' };
                        if (category === '我的书签') newSite.subCategory = '书签栏';
                        sites.unshift(newSite);
                    }
                    saveSites();
                    renderSites();
                    renderCategories();
                    renderSubCategories();
                    updateSiteCount();
                    closeAddModal();
                });
            }

            function openAddModal() {
                document.getElementById('editId').value = '';
                document.getElementById('siteName').value = '';
                document.getElementById('siteUrl').value = 'https://';
                document.getElementById('siteCategory').value = '常用';
                document.getElementById('modalTitle').textContent = '添加网站';
                document.getElementById('addModal').classList.remove('hidden');
                document.getElementById('addModal').classList.add('flex');
            }

            function closeAddModal() {
                document.getElementById('addModal').classList.add('hidden');
                document.getElementById('addModal').classList.remove('flex');
            }

            window.editSite = function(id) {
                const site = sites.find(s => s.id === id);
                if (site) {
                    document.getElementById('editId').value = id;
                    document.getElementById('siteName').value = site.name;
                    document.getElementById('siteUrl').value = site.url;
                    document.getElementById('siteCategory').value = site.category || '常用';
                    document.getElementById('modalTitle').textContent = '编辑网站';
                    document.getElementById('addModal').classList.remove('hidden');
                    document.getElementById('addModal').classList.add('flex');
                }
            };

            window.deleteSite = function(id) {
                if (confirm('确定要删除这个网站吗？')) {
                    sites = sites.filter(s => s.id !== id);
                    saveSites();
                    renderSites();
                    renderCategories();
                    renderSubCategories();
                    updateSiteCount();
                }
            };

            function updateSiteCount() {
                document.getElementById('siteCount').textContent = sites.length;
            }

            // ================================================================
            //  12. 运行时间
            // ================================================================
            let systemStartTime = (() => {
                const saved = storage.getItem('systemStartTime');
                if (saved) return parseInt(saved);
                const now = Date.now();
                storage.setItem('systemStartTime', now.toString());
                return now;
            })();

            function updateUptime() {
                const e = Math.floor((Date.now() - systemStartTime) / 1000);
                const h = String(Math.floor(e / 3600)).padStart(2, '0');
                const m = String(Math.floor((e % 3600) / 60)).padStart(2, '0');
                const s = String(e % 60).padStart(2, '0');
                document.getElementById('uptime').textContent = `${h}:${m}:${s}`;
            }

            // ================================================================
            //  13. 详情弹窗
            // ================================================================
            window.openDetailModal = async function(type) {
                const modal = document.getElementById('detailModal');
                const title = document.getElementById('detailTitle');
                const content = document.getElementById('detailContent');
                if (!modal || !title || !content) return;

                if (type === 'calendarFull') {
                    title.textContent = '📅 农历日历';
                    content.innerHTML = `
                        <div class="space-y-4">
                            <div class="flex items-center justify-between">
                                <button class="nav-btn" id="prevMonthBtn"><i class="fa fa-chevron-left"></i></button>
                                <span class="text-xl font-bold" id="calendarTitle">${currentCalendarYear}年${currentCalendarMonth}月</span>
                                <button class="nav-btn" id="nextMonthBtn"><i class="fa fa-chevron-right"></i></button>
                            </div>
                            <div id="calendarGrid" class="bg-white rounded-xl p-4 border border-gray-100"></div>
                            <div id="calendarYiJi" class="p-4 bg-gray-50 rounded-lg"></div>
                            <div class="flex flex-wrap justify-center gap-3 text-xs text-gray-500">
                                <span class="px-2 py-1 bg-amber-500 text-white rounded">今日</span>
                            </div>
                            <div class="p-2 bg-gray-50 rounded-lg text-xs text-gray-500 text-center">
                                📌 数据来源：老黄历 - 天行API（45号）
                            </div>
                        </div>
                    `;
                    await renderCalendar(currentCalendarYear, currentCalendarMonth);
                    document.getElementById('prevMonthBtn').addEventListener('click', () => {
                        if (currentCalendarMonth === 1) { currentCalendarMonth = 12;
                            currentCalendarYear--; } else { currentCalendarMonth--; }
                        renderCalendar(currentCalendarYear, currentCalendarMonth);
                    });
                    document.getElementById('nextMonthBtn').addEventListener('click', () => {
                        if (currentCalendarMonth === 12) { currentCalendarMonth = 1;
                            currentCalendarYear++; } else { currentCalendarMonth++; }
                        renderCalendar(currentCalendarYear, currentCalendarMonth);
                    });
                    modal.classList.remove('hidden');
                    modal.classList.add('flex');
                    return;
                }

                if (type === 'weather') {
                    title.textContent = '🌤️ 上海天气 & 7天预报';
                    let dailyHtml = '';
                    if (weatherData.daily && weatherData.daily.length > 0) {
                        dailyHtml = `<div class="p-4 bg-blue-50 rounded-xl"><div class="font-bold mb-3">📅 未来7天预报</div><div class="space-y-2">`;
                        weatherData.daily.forEach(item => {
                            dailyHtml += `
                                <div class="flex items-center justify-between py-2 border-b border-blue-100 last:border-0">
                                    <span class="w-16 font-medium text-sm">${item.day}</span>
                                    <span class="text-xs text-gray-500 w-12">${item.date}</span>
                                    <i class="fa ${item.icon} text-amber-500 w-6"></i>
                                    <span class="flex-1 text-center text-sm">${item.desc}</span>
                                    <span class="text-sm">
                                        <span class="text-rose-600">${item.max}°</span>
                                        <span class="text-gray-400 mx-1">/</span>
                                        <span class="text-blue-600">${item.min}°</span>
                                    </span>
                                </div>
                            `;
                        });
                        dailyHtml += `</div></div>`;
                    } else {
                        dailyHtml = `<div class="p-3 bg-gray-50 rounded-xl text-center text-gray-500">暂无预报数据</div>`;
                    }

                    const apiStatus = weatherData.apiStatus || 'loading';
                    const statusText = apiStatus === 'success' ? '✅ API 更新成功' :
                        (apiStatus === 'error' ? '❌ API 获取失败' : '⏳ API 加载中');

                    content.innerHTML = `
                        <div class="space-y-4">
                            <div class="text-center p-4 bg-sky-50 rounded-xl">
                                <div class="text-4xl ${weatherData.icon === 'fa-spinner fa-spin' ? 'text-gray-400' : 'text-amber-500'} mb-2">
                                    <i class="fa ${weatherData.icon}"></i>
                                </div>
                                <div class="text-3xl font-bold">${weatherData.temp}</div>
                                <div class="text-gray-500">${weatherData.desc}</div>
                                <div class="text-xs text-gray-400 mt-1">更新于 ${weatherData.updateTime}</div>
                                ${weatherData.aqi !== '--' ? `<div class="text-xs text-gray-500 mt-1">AQI: ${weatherData.aqi} · 空气质量: ${weatherData.quality}</div>` : ''}
                                <div class="mt-2 flex justify-center">
                                    <span class="api-status ${apiStatus}"><span class="dot"></span>${statusText}</span>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="p-3 bg-gray-50 rounded-xl text-center">
                                    <div class="text-blue-500"><i class="fa fa-tint"></i></div>
                                    <div class="font-bold">${weatherData.humidity}</div>
                                    <div class="text-xs text-gray-500">相对湿度</div>
                                </div>
                                <div class="p-3 bg-gray-50 rounded-xl text-center">
                                    <div class="text-cyan-500"><i class="fa fa-location-arrow"></i></div>
                                    <div class="font-bold">${weatherData.wind}</div>
                                    <div class="text-xs text-gray-500">风速</div>
                                </div>
                            </div>
                            ${dailyHtml}
                            <div class="p-2 bg-blue-50 rounded-lg text-xs text-gray-500 text-center">
                                📌 数据来源：<a href="https://www.tianapi.com" target="_blank" class="text-blue-600 hover:underline">天行API（72号）</a>
                            </div>
                        </div>
                    `;
                    modal.classList.remove('hidden');
                    modal.classList.add('flex');
                    return;
                }

                if (type === 'oil') {
                    title.textContent = '⛽ 油价行情';
                    const isDown = oilData.trend === 'down';
                    const isUp = oilData.trend === 'up';
                    const trendText = isDown ? '下调' : (isUp ? '上调' : '持平');
                    const trendColor = isDown ? 'text-green-600' : (isUp ? 'text-red-600' : 'text-gray-600');
                    const bgColor = isDown ? 'bg-green-50' : (isUp ? 'bg-red-50' : 'bg-gray-50');

                    const apiStatus = oilData.apiStatus || 'loading';
                    const statusText = apiStatus === 'success' ? '✅ API 更新成功' :
                        (apiStatus === 'error' ? '❌ API 获取失败' : '⏳ API 加载中');

                    content.innerHTML = `
                        <div class="space-y-4">
                            <div class="text-center p-4 ${bgColor} rounded-xl">
                                <div class="${trendColor} font-bold mb-1"><i class="fa fa-arrow-${isDown ? 'down' : (isUp ? 'up' : 'minus')}"></i> 油价${trendText}窗口</div>
                                <div class="text-sm text-gray-500">上次调整：${oilData.lastAdjusted || '--'}</div>
                                <div class="text-lg font-bold">下次调整：${oilData.nextAdjustment || '待定'}</div>
                                <div class="text-xs text-gray-500 mt-1">地区：${oilData.region}</div>
                                <div class="text-xs text-gray-400 mt-1">数据更新于 ${oilData.updateTime}</div>
                                <div class="text-xs text-gray-400 mt-0.5">📊 数据源：${oilData.source}</div>
                                <div class="mt-2 flex justify-center">
                                    <span class="api-status ${apiStatus}"><span class="dot"></span>${statusText}</span>
                                </div>
                            </div>
                            <div class="space-y-3">
                                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl"><span>92# 汽油</span><span class="font-bold">${typeof oilData.prices['92'] === 'number' ? oilData.prices['92'].toFixed(2) : '--'} 元/L</span></div>
                                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl"><span>95# 汽油</span><span class="font-bold">${typeof oilData.prices['95'] === 'number' ? oilData.prices['95'].toFixed(2) : '--'} 元/L</span></div>
                                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl"><span>98# 汽油</span><span class="font-bold">${typeof oilData.prices['98'] === 'number' ? oilData.prices['98'].toFixed(2) : '--'} 元/L</span></div>
                                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl"><span>0# 柴油</span><span class="font-bold">${typeof oilData.prices['0'] === 'number' ? oilData.prices['0'].toFixed(2) : '--'} 元/L</span></div>
                            </div>
                            <div class="flex justify-center gap-3">
                                <button onclick="forceRefreshOil()" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors text-sm">
                                    <i class="fa fa-refresh mr-1"></i> 手动刷新油价
                                </button>
                            </div>
                            <div class="p-4 bg-amber-50 rounded-xl">
                                <div class="font-bold mb-2">💡 油价提示</div>
                                <div class="text-sm text-gray-600">油价每10个工作日调整一次，数据仅供参考，具体以当地加油站为准。</div>
                                <div class="text-xs text-gray-500 mt-2">📊 当前数据源: ${oilData.source}</div>
                            </div>
                        </div>
                    `;
                    modal.classList.remove('hidden');
                    modal.classList.add('flex');
                    return;
                }

                if (type === 'calendar') {
                    const now = new Date();
                    const info = await fetchSingleDayHuangli(now.getFullYear(), now.getMonth() + 1, now.getDate());

                    const yiText = info.fitness !== '--' ? info.fitness.replace(/\./g, '、').replace(/,/g, '、') : '无';
                    const jiText = info.taboo !== '--' ? info.taboo.replace(/\./g, '、').replace(/,/g, '、') : '无';

                    let lunarDisplay = '';
                    if (info.lunarYear !== '--' && info.lunarMonth !== '--' && info.lunarDay !== '--') {
                        lunarDisplay =
                            `${info.tiangandizhi.year || info.lunarYear}年【${info.shengxiao}年】 ${info.lunarMonth}月${info.lunarDay}`;
                    } else if (info.lunarDay !== '--') {
                        lunarDisplay = `${info.lunarMonth}月${info.lunarDay}`;
                    } else {
                        lunarDisplay = '--';
                    }

                    const festivalText = info.festival !== '--' && info.festival !== '' ? info.festival : '';
                    const lunarFestivalText = info.lunarFestival !== '--' && info.lunarFestival !== '' ? info.lunarFestival :
                        '';
                    let festivalDisplay = '';
                    if (festivalText && lunarFestivalText) {
                        festivalDisplay = `${festivalText}、${lunarFestivalText}`;
                    } else if (festivalText) {
                        festivalDisplay = festivalText;
                    } else if (lunarFestivalText) {
                        festivalDisplay = lunarFestivalText;
                    }

                    title.textContent = '📅 今日黄历';

                    const hlStatus = huangliData.apiStatus || 'loading';
                    const hlStatusText = hlStatus === 'success' ? '✅ 已更新' :
                        (hlStatus === 'error' ? '❌ 获取失败' : '⏳ 加载中');

                    content.innerHTML = `
                        <div class="space-y-4">
                            <div class="text-center p-4 bg-amber-50 rounded-xl">
                                <div class="text-2xl font-bold">${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日</div>
                                <div class="text-gray-500">${lunarDisplay}</div>
                                ${festivalDisplay ? `<div class="text-sm text-rose-600 mt-1">🎉 ${festivalDisplay}</div>` : ''}
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="p-4 bg-green-50 rounded-xl text-center">
                                    <div class="text-green-600 font-bold mb-2">✅ 宜</div>
                                    <div class="text-sm">${yiText}</div>
                                </div>
                                <div class="p-4 bg-rose-50 rounded-xl text-center">
                                    <div class="text-rose-600 font-bold mb-2">❌ 忌</div>
                                    <div class="text-sm">${jiText}</div>
                                </div>
                            </div>
                            ${info.chongsha !== '--' ? `<div class="flex items-center justify-center text-sm"><span class="text-gray-500 mr-2">🐉 冲煞：</span><span class="text-gray-700">${info.chongsha}</span></div>` : ''}
                            ${info.jianshen !== '--' ? `<div class="flex items-center justify-center text-sm"><span class="text-gray-500 mr-2">📐 建除：</span><span class="text-gray-700">${info.jianshen}</span></div>` : ''}
                            ${info.shenwei !== '--' ? `<div class="bg-amber-50 rounded-lg p-2 border border-amber-200 text-center"><div class="text-xs text-amber-700 font-bold mb-1">🧭 吉神方位</div><div class="text-sm text-gray-700">${info.shenwei}</div></div>` : ''}
                            ${info.xingsu !== '--' ? `<div class="text-center text-sm"><span class="text-gray-500">⭐ 星宿：</span><span class="text-gray-700">${info.xingsu}</span></div>` : ''}
                            ${info.pengzu !== '--' ? `<div class="text-center text-sm"><span class="text-gray-500">⚠️ 彭祖百忌：</span><span class="text-gray-700">${info.pengzu}</span></div>` : ''}
                            ${info.taishen !== '--' ? `<div class="text-center text-sm"><span class="text-gray-500">👶 胎神：</span><span class="text-gray-700">${info.taishen}</span></div>` : ''}
                            <div class="text-center text-xs text-gray-400">📌 老黄历：天行API（45号）</div>
                            <div class="flex justify-center">
                                <span class="api-status ${hlStatus}"><span class="dot"></span>老黄历 ${hlStatusText}</span>
                            </div>
                        </div>
                    `;
                    modal.classList.remove('hidden');
                    modal.classList.add('flex');
                    return;
                }
            };

            window.closeDetailModal = function() {
                document.getElementById('detailModal').classList.add('hidden');
                document.getElementById('detailModal').classList.remove('flex');
            };

            // ================================================================
            //  14. 初始化
            // ================================================================
            async function init() {
                try {
                    initTheme();
                    sites = loadSites();
                    renderCategories();
                    renderSubCategories();
                    renderSites();
                    setupEventListeners();
                    updateSiteCount();

                    const now = new Date();

                    // 加载天气
                    await fetchWeather();

                    // 加载油价
                    await fetchOilPrice();

                    // 加载老黄历
                    const dateStr =
                        `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
                    await fetchHuangli(dateStr);

                    // 更新时间
                    await updateTime();
                    updateUptime();

                    setInterval(updateTime, 1000);
                    setInterval(updateUptime, 1000);
                    setInterval(fetchWeather, 30 * 60 * 1000);

                    const ep = document.getElementById('errorPlaceholder');
                    if (ep) ep.style.display = 'none';

                    console.log('✅ 导航页启动成功 (老黄历45号 + 天气72号 + 油价104-2号)');
                } catch (err) {
                    console.error('❌ 初始化失败:', err);
                    const ep = document.getElementById('errorPlaceholder');
                    if (ep) {
                        ep.style.display = 'block';
                        ep.innerHTML = `<strong>⚠️ 页面加载错误</strong><br>${err.message}`;
                    }
                }
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>
</body>
</html>
